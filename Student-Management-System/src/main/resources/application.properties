# Application Name
spring.application.name=Student-Management-System

# Server Configuration
server.port=8082

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/student_jwt
spring.datasource.username=root
spring.datasource.password=vishu5550
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.use_sql_comments=true

# JWT Configuration (IMPORTANT - ADD THIS)
jwt.secret=StudentManagementSecretKeyForJWTTokenMustBeAtLeast256BitsLongForHS512Algorithm
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# JWT Expiration explained:
# jwt.expiration=86400000          -> 24 hours (in milliseconds)
# jwt.refresh-expiration=604800000 -> 7 days (in milliseconds)

# Logging Configuration
logging.level.com.JwtBased=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson Configuration (For JSON)
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null



# Swagger/OpenAPI Configuration (Since you have springdoc dependency)
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method

# Error Configuration
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false

# File Upload Config
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ? Local disk path ? Windows
file.upload.dir=C:/StudentManagement/uploads/profiles